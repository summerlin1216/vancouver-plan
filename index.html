<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出去玩最開心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blk:#111;--wht:#fff;--cream:#F9F6F0;--gray:#F0F0F0;--mid:#CCC;--drk:#555;
  --serif:"Playfair Display",serif;--sans:"Inter","Helvetica Neue",sans-serif
}
body{font-family:var(--sans);background:var(--wht);color:var(--blk);max-width:700px;margin:0 auto;padding:0 20px}
.topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--blk);padding:14px 0;margin:0 -20px;padding-left:20px;padding-right:20px}
.brand{font-family:var(--serif);font-size:1.4rem;font-weight:900;letter-spacing:.08em;margin-bottom:10px}
.tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;font-size:.65rem;letter-spacing:.1em;font-weight:600;font-family:var(--sans);border:1px solid var(--mid);background:none;cursor:pointer;color:var(--drk);border-radius:20px}
.tab.active{color:#fff;background:var(--blk);border-color:var(--blk)}
.cnt-row{font-size:.65rem;color:var(--drk);margin-top:8px;letter-spacing:.05em}
.cnt-row strong{color:var(--blk)}
.filterbar{padding:12px 0;border-bottom:1px solid var(--gray);margin-bottom:16px}
.fg{margin-bottom:8px}
.fl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--drk);font-weight:600;display:block;margin-bottom:5px}
.chiprow{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 11px;font-size:.62rem;letter-spacing:.05em;font-weight:500;font-family:var(--sans);border:1px solid var(--mid);background:#fff;cursor:pointer;color:var(--drk);border-radius:14px}
.chip.active{background:var(--blk);color:#fff;border-color:var(--blk)}
.cards{display:flex;flex-direction:column;gap:0}
.card{border-bottom:1px solid var(--gray);padding:18px 0}
.card.hidden{display:none}
.ci{width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--cream);border-radius:6px;position:relative;margin-bottom:12px;display:flex;align-items:center;justify-content:center}
.ci img{width:100%;height:100%;object-fit:cover;display:block}
.ci-ph{font-size:2.2rem;color:var(--mid)}
.bdg{position:absolute;top:8px;left:8px;background:#fff;font-size:.55rem;letter-spacing:.08em;padding:3px 8px;font-weight:700;border-radius:3px}
.tbdg{position:absolute;top:8px;right:8px;background:var(--blk);color:#fff;font-size:.55rem;padding:3px 8px;font-weight:600;border-radius:3px}
.cm{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.cr{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--drk)}
.cs{font-size:.58rem;color:var(--mid);margin-left:auto}
.ct{font-family:var(--serif);font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:8px}
.mi{margin-bottom:6px}
.mt{font-size:.58rem;letter-spacing:.08em;padding:3px 8px;background:var(--blk);color:#fff;font-weight:600;border-radius:3px;display:inline-block}
.pr{font-size:.75rem;font-weight:600;margin-bottom:8px}
.cd{font-size:.85rem;line-height:1.75;color:var(--drk);font-weight:300;margin-bottom:12px}
.cf{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.55rem;letter-spacing:.05em;padding:3px 8px;border:1px solid var(--mid);color:var(--drk);border-radius:10px}
.lks{display:flex;gap:14px;align-items:center}
.ml{font-size:.68rem;font-weight:600;color:#1a73e8;text-decoration:none}
.cl{font-size:.68rem;font-weight:700;color:var(--blk);text-decoration:none}
.empty{text-align:center;padding:60px 20px}
.empty-t{font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--mid);margin-bottom:8px}
.empty-s{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mid)}
.src-note{font-size:.55rem;color:var(--mid);margin-top:6px;line-height:1.5}
footer{border-top:1px solid var(--blk);padding:24px 0;margin-top:20px;text-align:center}
.fb{font-family:var(--serif);font-size:1rem;font-weight:900;letter-spacing:.1em;margin-bottom:6px}
.fn{font-size:.55rem;letter-spacing:.08em;color:var(--mid)}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">出去玩最開心</div>
  <div class="tabs">
    <button class="tab active" data-mode="all">全部</button>
    <button class="tab" data-mode="weeknight">平日晚上 🌇</button>
    <button class="tab" data-mode="weekend">假日 🏔</button>
  </div>
  <div class="cnt-row">共 <strong id="cnt">0</strong> 個行程</div>

  <div class="fg">
    <span class="fl">地區</span>
    <div class="chiprow">
      <button class="chip active" data-f="region" data-v="all">全部</button>
      <button class="chip" data-f="region" data-v="Downtown">市中心</button>
      <button class="chip" data-f="region" data-v="Burnaby">本拿比</button>
      <button class="chip" data-f="region" data-v="Richmond">列治文</button>
      <button class="chip" data-f="region" data-v="North Van">北溫</button>
      <button class="chip" data-f="region" data-v="Others">其他</button>
    </div>
  </div>
  <div class="fg">
    <span class="fl">類型</span>
    <div class="chiprow">
      <button class="chip active" data-f="cat" data-v="all">全部</button>
      <button class="chip" data-f="cat" data-v="Hiking">Hiking</button>
      <button class="chip" data-f="cat" data-v="逛街">逛街</button>
      <button class="chip" data-f="cat" data-v="音樂">音樂</button>
      <button class="chip" data-f="cat" data-v="美食">美食</button>
    </div>
  </div>
  <div class="fg">
    <span class="fl">交通</span>
    <div class="chiprow">
      <button class="chip active" data-f="transit" data-v="all">全部</button>
      <button class="chip" data-f="transit" data-v="大眾運輸">大眾運輸</button>
      <button class="chip" data-f="transit" data-v="建議開車">建議開車</button>
    </div>
  </div>
  <div class="fg">
    <span class="fl">天氣</span>
    <div class="chiprow">
      <button class="chip active" data-f="weather" data-v="all">全部</button>
      <button class="chip" data-f="weather" data-v="室內">室內</button>
      <button class="chip" data-f="weather" data-v="戶外">戶外</button>
    </div>
  </div>
</div>

<div class="cards" id="cards"></div>

<footer>
  <div class="fb">出去玩最開心</div>
  <div class="fn">圖片來源：Wikimedia Commons ｜ 資訊來源：604 Now · Daily Hive · Songkick · Fortune Sound Club</div>
</footer>

    lks.className = "lks";

    var ma = document.createElement("a");
    ma.href = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(mapQ);
    ma.target = "_blank";
    ma.rel = "noopener";
    ma.className = "ml";
    ma.textContent = "📍 導航";
    lks.appendChild(ma);
    if (d.L) {
      var la = document.createElement("a");
      la.href = d.L;
      la.target = "_blank";
      la.rel = "noopener";
      la.className = "cl";
      la.textContent = "詳情 →";
      lks.appendChild(la);
    }
    cf.appendChild(lks);
    card.appendChild(cf);

    return card;
  }

  function render() {
    var container = document.getElementById("cards");
    container.innerHTML = "";
    DATA.forEach(function (d) {
      container.appendChild(buildCard(d));
    });
    applyFilter();
  }

  function applyFilter() {
    var container = document.getElementById("cards");
    var cards = container.querySelectorAll(".card");
    var cnt = 0;
    cards.forEach(function (c) {
      var ok = (curMode === "all" || c.dataset.mode === curMode)
        && (curF.region === "all" || c.dataset.region === curF.region)
        && (curF.cat === "all" || c.dataset.cat === curF.cat)
        && (curF.transit === "all" || c.dataset.transit === curF.transit)
        && (curF.weather === "all" || c.dataset.weather === curF.weather);
      c.classList.toggle("hidden", !ok);
      if (ok) cnt++;
    });
    document.getElementById("cnt").textContent = cnt;

    var old = container.querySelector(".empty");
    if (old) old.remove();
    if (cnt === 0) {
      var e = document.createElement("div");
      e.className = "empty";
      var et = document.createElement("div");
      et.className = "empty-t";
      et.textContent = "沒有符合條件的行程";
      e.appendChild(et);
      var es = document.createElement("div");
      es.className = "empty-s";
      es.textContent = "試試調整上方篩選條件";
      e.appendChild(es);
      container.appendChild(e);
    }
  }

  document.querySelectorAll(".tab").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".tab").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      curMode = btn.dataset.mode;
      applyFilter();
    });
  });

  document.querySelectorAll(".chip").forEach(function (chip) {
    chip.addEventListener("click", function () {
      var f = chip.dataset.f;
      document.querySelectorAll(".chip[data-f='" + f + "']").forEach(function (x) { x.classList.remove("active"); });
      chip.classList.add("active");
      curF[f] = chip.dataset.v;
      applyFilter();
    });
  });

  render();

});
</script>
</body>
</html>
