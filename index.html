<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出去玩最開心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blk:#111;--wht:#fff;--cream:#F9F6F0;--gray:#F0F0F0;--mid:#CCC;--drk:#555;
  --serif:"Playfair Display",serif;--sans:"Inter","Helvetica Neue",sans-serif
}
body{font-family:var(--sans);background:var(--wht);color:var(--blk);max-width:700px;margin:0 auto;padding:0 20px}
.topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--blk);padding:14px 0;margin:0 -20px;padding-left:20px;padding-right:20px}
.brand{font-family:var(--serif);font-size:1.4rem;font-weight:900;letter-spacing:.08em;margin-bottom:10px}
.tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 12px;font-size:.65rem;letter-spacing:.1em;font-weight:600;font-family:var(--sans);border:1px solid var(--mid);background:none;cursor:pointer;color:var(--drk);border-radius:20px}
.tab.active{color:#fff;background:var(--blk);border-color:var(--blk)}
.cnt-row{font-size:.65rem;color:var(--drk);margin-top:8px;letter-spacing:.05em}
.cnt-row strong{color:var(--blk)}
.filterbar{padding:12px 0;border-bottom:1px solid var(--gray);margin-bottom:16px}
.fg{margin-bottom:8px}
.fl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--drk);font-weight:600;display:block;margin-bottom:5px}
.chiprow{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 11px;font-size:.62rem;letter-spacing:.05em;font-weight:500;font-family:var(--sans);border:1px solid var(--mid);background:#fff;cursor:pointer;color:var(--drk);border-radius:14px}
.chip.active{background:var(--blk);color:#fff;border-color:var(--blk)}
.cards{display:flex;flex-direction:column;gap:0}
.card{border-bottom:1px solid var(--gray);padding:18px 0}
.card.hidden{display:none}
.ci{width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--cream);border-radius:6px;position:relative;margin-bottom:12px;display:flex;align-items:center;justify-content:center}
.ci img{width:100%;height:100%;object-fit:cover;display:block}
.ci-ph{font-size:2.2rem;color:var(--mid)}
.bdg{position:absolute;top:8px;left:8px;background:#fff;font-size:.55rem;letter-spacing:.08em;padding:3px 8px;font-weight:700;border-radius:3px}
.tbdg{position:absolute;top:8px;right:8px;background:var(--blk);color:#fff;font-size:.55rem;padding:3px 8px;font-weight:600;border-radius:3px}
.cm{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.cr{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--drk)}
.cs{font-size:.58rem;color:var(--mid);margin-left:auto}
.ct{font-family:var(--serif);font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:8px}
.mi{margin-bottom:6px}
.mt{font-size:.58rem;letter-spacing:.08em;padding:3px 8px;background:var(--blk);color:#fff;font-weight:600;border-radius:3px;display:inline-block}
.pr{font-size:.75rem;font-weight:600;margin-bottom:8px}
.cd{font-size:.85rem;line-height:1.75;color:var(--drk);font-weight:300;margin-bottom:12px}
.pt{margin-bottom:9px;font-size:.83rem;line-height:1.7;color:var(--drk);font-weight:300}
.pt:last-child{margin-bottom:13px}
.pt-lbl{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--blk);margin-bottom:2px}
.pt-warn .pt-lbl{color:#a85a2a}
.pt-warn{color:#8a5a30}
.cf{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.55rem;letter-spacing:.05em;padding:3px 8px;border:1px solid var(--mid);color:var(--drk);border-radius:10px}
.lks{display:flex;gap:14px;align-items:center}
.ml{font-size:.68rem;font-weight:600;color:#1a73e8;text-decoration:none}
.cl{font-size:.68rem;font-weight:700;color:var(--blk);text-decoration:none}
.empty{text-align:center;padding:60px 20px}
.empty-t{font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--mid);margin-bottom:8px}
.empty-s{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mid)}
.src-note{font-size:.55rem;color:var(--mid);margin-top:6px;line-height:1.5}
footer{border-top:1px solid var(--blk);padding:24px 0;margin-top:20px;text-align:center}
.fb{font-family:var(--serif);font-size:1rem;font-weight:900;letter-spacing:.1em;margin-bottom:6px}
.fn{font-size:.55rem;letter-spacing:.08em;color:var(--mid)}
</style>
</head>

<header class="topbar">
  <div class="brand">出去玩最開心</div>

<div class="filterbar">

      <button class="chip active" data-f="region" data-v="all">全部</button>
      <button class="chip" data-f="region" data-v="Downtown">市中心</button>
      <button class="chip" data-f="region" data-v="Burnaby">本拿比</button>

      <button class="chip active" data-f="cat" data-v="all">全部</button>
      <button class="chip" data-f="cat" data-v="Hiking">Hiking</button>
      <button class="chip" data-f="cat" data-v="逛街">逛街</button>
      <button class="chip" data-f="cat" data-v="音樂">音樂</button>
      <button class="chip" data-f="cat" data-v="美食">美食</button>
    </div>
  </div>
  <div class="fg">
    <span class="fl">交通</span>
    <div class="chiprow">
      <button class="chip active" data-f="transit" data-v="all">全部</button>
      <button class="chip" data-f="transit" data-v="大眾運輸">大眾運輸</button>
      <button class="chip" data-f="transit" data-v="建議開車">建議開車</button>
    </div>
  </div>
  <div class="fg">
    <span class="fl">天氣</span>
    <div class="chiprow">
      <button class="chip active" data-f="weather" data-v="all">全部</button>
      <button class="chip" data-f="weather" data-v="室內">室內</button>
      <button class="chip" data-f="weather" data-v="戶外">戶外</button>
    </div>
  </div>
</div>

<div class="cards" id="cards"></div>

<footer>
  <div class="fb">出去玩最開心</div>

</footer>

<script>
window.addEventListener("DOMContentLoaded", function () {

  // Wikimedia Special:FilePath 會自動重新導向到正確的雜湊路徑，不需要手動計算 MD5
  function wm(filename) {
    return "https://commons.wikimedia.org/wiki/Special:FilePath/" + encodeURIComponent(filename);
  }

  var DATA = [

  /* ===== 平日晚上 ===== */
  {T:"Deep Cove 黃昏散步",M:"weeknight",C:"Hiking",R:"North Van",Tr:"建議開車",W:"戶外",
   F:"Deep Cove是北溫最迷人的峽灣小村，這片海岸自古以來就是Tsleil-Waututh族世代生活的水域，後來因獨木舟與健行愛好者聚集而成了「平日限定」的本地秘密基地——周末才會被觀光客攻陷，老溫哥華人都愛挑平日傍晚來這裡躲清靜。",
   BT:"平日傍晚最推薦，日落前1-2小時抵達光線最美；Honey's Doughnuts營業時間以官網最新公告為準，建議先去買完甜點再散步。全年開放、免費無需門票。",
   IT:"Honey's Doughnuts買甜點 → 碼頭散步道 → Panorama Park看台收尾。先吃甜點補充體力，沿岸走到底的小公園可以坐看整個峽灣，完全不會走錯路，單程不到20分鐘超適合下班後放空一下。",
   N:"沒有大眾運輸直達，建議開車或共乘；碼頭周邊停車格有限，旺季傍晚也會一位難求，建議盡量提早出發。",
   Dt:"平日任意日",S:"604 Now",L:"https://do604.com",Map:"Deep Cove, North Vancouver, British Columbia, Canada",
   I:wm("Lonsdale Ave North Vancouver BC.JPG")},

  {T:"Burrard Bridge 黃昏散步",M:"weeknight",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Burrard Bridge建於1932年，是溫哥華少有保留完整的Art Deco風格大橋，橋頭兩端的復古路燈跟船首雕像很有味道，本地人喜歡這條路線，是因為它把市中心、Kitsilano沙灘跟海平面的夕陽連成一條線——走過這座橋就像跟整座城市道晚安。",
   BT:"平日傍晚5點後最推薦，太陽約在7-9點間（依季節）沉入海平面；全年開放、走路或騎車都不收費，只要避開上下班尖峰車流多的時段。",
   IT:"Granville站出發 → Burrard Bridge步道 → Kitsilano Beach躺看夕陽。從Granville站走橋上人行道，過橋後直接接上Kits Beach沙灘，可以一路走到沙灘的躺椅區坐到天黑，動線完全沿著海岸，中途不用繞路，超順。",
   N:"橋上人行道偏窄、跟自行車共用，黃昏時段人車都多，建議走橋邊靠外側欄杆那條，拍照時記得讓行給通勤的自行車。",
   Dt:"平日任意日",S:"Daily Hive",L:"https://dailyhive.com/vancouver",Map:"Burrard Bridge, Vancouver, British Columbia, Canada",
   I:wm("Burrard Bridge, Vancouver (2012) - 1.JPG")},

  {T:"Capilano River 溪谷步道",M:"weeknight",C:"Hiking",R:"North Van",Tr:"建議開車",W:"戶外",
   F:"Capilano River Regional Park沿著峽谷而建，這條河自古就是鮭魚迴游的重要水道，每年秋天還能看到鮭魚逆流而上，本地人喜歡這裡，是因為步道平緩、林蔭濃密，是「下班後不用開很久的車也能森林浴」的存在。",
   BT:"全年開放、免費入園；日落前1小時出發剛好能走完來回路段，夏季傍晚林間溫度比市區低很多，很適合避暑。",
   IT:"Cleveland Dam停車場 → Pipe Bridge觀景橋 → Salmon Hatchery鮭魚孵育場（若開放）。從大壩停車場進入沿河谷走到吊橋拍照點，回程順道看看鮭魚孵育設施，是單一環形路線不會走重複路，很適合散步約會。",
   N:"部分支線步道較濕滑，雨後建議穿防滑鞋；鮭魚迴游季（約9-11月）現場較熱鬧，平日傍晚仍是人最少的時段。",
   Dt:"平日任意日",S:"604 Now",L:"https://do604.com",Map:"Capilano River Regional Park, North Vancouver, British Columbia, Canada",
   I:wm("Capilano suspension bridge -a.jpg")},

  {T:"Stanley Park 黃昏跑步",M:"weeknight",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Stanley Park的海堤跑步路線是本地跑者的心頭好，這片海岸是Squamish、Musqueam、Tsleil-Waututh族世代生活的土地，夜幕低垂時跑向Brockton Point燈塔，左手邊是港口船隻燈火、右手邊是北溫山脈剪影，夜跑的寧靜感跟白天的觀光人潮完全是兩個世界。",
   BT:"全年開放、24小時免費，平日傍晚最推薦，日落後天色全黑前這段「藍色時刻」最美；冬天記得帶頭燈，夏天傍晚反而涼爽舒適。",
   IT:"Coal Harbour入口起跑 → Brockton Point燈塔 → Lumberman's Arch圖騰柱。沿海堤單程約3km到燈塔看夜景，回程順道走到圖騰柱旁拍張照，整段路完全沿海堤不用穿越車道，安全又好認路。",
   N:"海堤照明在燈塔以外路段較少，建議結伴或帶反光臂帶；單程約3km、來回6km，體力沒把握建議只跑單程後搭公車返回。",
   Dt:"平日任意日",S:"Tourism Vancouver",L:"https://stanleypark.com",Map:"Stanley Park, Vancouver, British Columbia, Canada",
   I:wm("Stanley Park totem poles, Vancouver (2013) - 1.JPG")},

  {T:"Granville Island 傍晚市集",M:"weeknight",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"室內",
   F:"Granville Island原本是1900年代的工業小島（船廠、鋸木廠），1970年代轉型成創意市集後保留了大量工業風建築外觀，本地人喜歡傍晚來，是因為遊客退潮後，才是真正屬於溫哥華人的悠閒採買時光。",
   BT:"Public Market營業時間以官網最新公告為準，建議5點後抵達，人潮明顯變少；假日白天則是觀光客最多的時段，平日傍晚體驗完全不同。",
   IT:"Public Market採買晚餐 → 海堤步道散步 → Bridges Restaurant露台喝一杯。先進市場挑現烤麵包跟起司當晚餐，出來沿海堤走幾步路就到河岸，坐在露台看夕陽下的False Creek，整段動線都在小島範圍內，完全不用移動交通工具。",
   N:"部分小店週一公休，建議出發前用Google地圖查詢個別店家當天營業狀況；停車場假日經常滿，平日傍晚相對好停。",
   Dt:"平日至7pm",S:"Tourism Vancouver",L:"https://granvilleisland.com",Map:"Granville Island Public Market, 1669 Johnston Street, Vancouver, British Columbia, Canada",
   I:wm("Granville Island (118200909).jpg")},

  {T:"Lonsdale Quay 碼頭夜間散步",M:"weeknight",C:"逛街",R:"North Van",Tr:"大眾運輸",W:"戶外",
   F:"Lonsdale Quay是North Vancouver的渡輪門戶，SeaBus這條航線從1977年就在運行，是溫哥華少有「通勤船」變成「觀光體驗」的交通工具，本地人喜歡周五夜市的悠閒氣氛，遠勝過假日人擠人。",
   BT:"週五夜市固定營業到晚上10點，是這裡唯一的夜間營業時段；其他平日傍晚則以散步看港景為主，Market本身通常6點左右收攤。",
   IT:"SeaBus下船 → Lonsdale Quay Market逛攤位 → 碼頭外看對岸市區燈火。下船就是市場，逛完手工冰淇淋攤，走出市場直接面對整片海港跟對岸downtown的天際線，全程步行可達，回程搭SeaBus直接回市區超方便。",
   N:"只有週五才有夜市到10點，平日其他時間Market關門較早，出發前建議先確認當天是否是週五。",
   Dt:"週五夜市3-10pm",S:"604 Now",L:"https://do604.com",Map:"Lonsdale Quay Market, 123 Carrie Cates Court, North Vancouver, British Columbia, Canada",
   I:wm("Lonsdale Ave North Vancouver BC.JPG")},

  {T:"Commercial Drive 街區散步",M:"weeknight",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Commercial Drive暱稱「The Drive」，曾是義大利移民社區的核心，後來陸續融入葡萄牙、拉丁美洲、嬉皮文化，變成全溫哥華最有「街頭個性」的一條街——本地人愛它，是因為這裡沒有連鎖店那種制式感，每間店都像主人的個性延伸。",
   BT:"平日傍晚人流最舒服，白天咖啡廳人多桌位難找，晚上7-9點獨立餐廳跟酒吧的氣氛反而更好；全年皆可散步，沒有季節限制。",
   IT:"Grandview Park小歇 → 獨立咖啡廳坐坐 → 異國餐廳吃晚餐。從公園開始散步暖身，沿路挑一間順眼的咖啡廳坐下喝杯咖啡，接著繼續往南走找間異國料理當晚餐，整條Drive呈南北一直線，不會走錯方向也不用繞路。",
   N:"街上小店風格參差不齊，部分店家公休日不固定，建議用手機地圖確認個別店家當天是否營業。",
   Dt:"平日任意日",S:"Daily Hive",L:"https://dailyhive.com/vancouver",Map:"Commercial Drive, Vancouver, British Columbia, Canada",
   I:wm("Commercial Drive (8110991970).jpg")},

  {T:"Vancouver Lookout 觀景台夜景",M:"weeknight",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"室內",
   F:"Vancouver Lookout建於1977年，外觀像顆飛碟停在36層樓高的塔頂，本地人會帶第一次來訪的朋友去，是因為360度旋轉電梯跟玻璃外牆視野，能一次看懂整座城市跟海港、雪山的相對位置——比任何地圖都直觀。",
   BT:"營業時間以官網最新公告為準，建議傍晚6點左右上樓，可以一次看到日落跟夜景的過渡，門票當天可無限次進出。",
   IT:"Waterfront站出站 → Vancouver Lookout觀景 → Canada Place海濱走走。出站走3分鐘就到塔下，上樓看完夜景後下樓往海邊方向走，Canada Place的白帆造型建築夜晚打燈也很好拍，動線完全沿著市中心北端，不用搭車。",
   N:"門票需另外購買，並非免費景點；遇到強風或維修日偶爾會暫停開放，出發前建議查官網確認當天營運狀態。",
   Dt:"平日9am-9pm",S:"Tourism Vancouver",L:"https://vancouverlookout.com",Map:"Vancouver Lookout, 555 West Hastings Street, Vancouver, British Columbia, Canada",
   I:wm("Downtown from Port Vancouver - panoramio.jpg")},

  {T:"Yaletown / False Creek 黃昏慢跑",M:"weeknight",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Yaletown過去是鐵路貨運倉庫區，1986年世博會後逐漸轉型成精品社區，沿著False Creek這段濱水跑道本地人特別愛，是因為一邊是磚牆倉庫改建的高級公寓、一邊是水面映著夕陽，新舊溫哥華在這條路上交會。",
   BT:"平日傍晚為主，全年開放免費使用；夏季傍晚7-9點是最多人運動的時段，但步道夠寬不會太擁擠。",
   IT:"Yaletown-Roundhouse站出發 → False Creek濱水步道 → Granville Island。從捷運站出發沿水岸跑或走到Granville Island，全程約5km地勢平坦，終點剛好可以進市場喝杯飲料休息，單向直線路線，不容易迷路。",
   N:"步道與自行車道是共用，建議運動時注意方向標示，避開逆向造成碰撞。",
   Dt:"平日任意日",S:"Daily Hive",L:"https://dailyhive.com/vancouver",Map:"Yaletown, Vancouver, British Columbia, Canada",
   I:wm("False Creek Vancouver British Columbia Canada 02.jpg")},

  {T:"Queen Elizabeth Park 半山夕陽",M:"weeknight",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Queen Elizabeth Park所在的小山丘曾經是採石場，1930年代填平後改建成公園，現在是溫哥華市區海拔最高的公園（152米）——本地人喜歡傍晚來，是因為玫瑰園跟Bloedel溫室周邊視野遼闊，而且免門票就能換到接近山頂的全景。",
   BT:"全年開放、24小時免費入園（Bloedel溫室需另購門票且有獨立營業時間）；傍晚金色時刻光線灑在花圃上最美，建議日落前1小時抵達。",
   IT:"玫瑰園賞花 → 山頂觀景台看城市天際線 → Bloedel溫室外散步收尾。先在玫瑰園慢慢逛，接著走到視野最開闊的山頂平台看整座城市跟北岸山脈，最後繞到溫室外圍散步，整段路都在公園步道內，坡度平緩好走。",
   N:"Bloedel溫室有自己的開放時間與門票費用，若只想看免費景觀，公園本身的觀景台已經足夠，不需要額外購票進溫室。",
   Dt:"平日任意日",S:"Tourism Vancouver",L:"https://vancouver.ca/parks",Map:"Queen Elizabeth Park, 4600 Cambie Street, Vancouver, British Columbia, Canada",
   I:wm("Bloedel Floral Conservatory, Queen Elizabeth Park - Vancouver, Canada - DSC07563.JPG")},

  {T:"Chinatown 街區夜遊",M:"weeknight",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"溫哥華中國城是北美歷史最悠久的華埠之一，19世紀末因鐵路與淘金熱興建而起，本地人喜歡夜晚來逛，是因為霓虹招牌跟百年磚樓在燈光下特別有電影感，跟白天的市場氣氛完全不同。",
   BT:"平日晚上散步最適合，街區本身全天開放；多數店家晚間8-9點左右收攤，建議晚餐後7-8點抵達剛好能逛到打烊前。",
   IT:"中華門牌樓 → 主街霓虹招牌街拍 → 孫中山古典中式庭園外觀。從牌樓進入主街，邊走邊拍霓虹招牌，最後繞到庭園外側欣賞造景，整段路徒步10分鐘內可走完，動線單純好掌握。",
   N:"部分街區夜間人煙較少，建議結伴同行；孫中山庭園夜間不開放入內參觀，只能欣賞外觀，白天才能購票入內。",
   Dt:"平日任意日",S:"604 Now",L:"https://vancouverchinatown.ca",Map:"Chinatown, Vancouver, British Columbia, Canada",
   I:wm("Vancouver's Chinatown at night. (15234326238).jpg")},

  {T:"New Westminster Quay 河濱步道",M:"weeknight",C:"Hiking",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"New Westminster是BC省最早的首府（1859年），Fraser River沿岸的Quay木棧道保留了這座「皇家城市」面河而生的歷史記憶，本地人喜歡這裡地勢平坦、視野遼闊，是遛狗散步的熟門熟路口袋名單。",
   BT:"全年開放、免費，平日傍晚最推薦，夕陽落在河面的角度在這裡特別漂亮；冬天記得提早出發避免天黑過快。",
   IT:"New Westminster站下車 → Quay木棧道散步 → River Market小吃收尾。出站步行5分鐘就到河岸，沿木棧道走到底，River Market裡有不少小吃攤可以填肚子，整段路線從捷運站到市場呈一直線，回程原路走回站體即可。",
   N:"木棧道部分路段晚間照明較弱，建議天黑前抵達或結伴前往。",
   Dt:"平日任意日",S:"Daily Hive",L:"https://dailyhive.com/vancouver",Map:"New Westminster Quay, New Westminster, British Columbia, Canada",
   I:wm("Westminster Pier Park 2015-06-27.jpg")},

  {T:"Mount Seymour 平日眺望",M:"weeknight",C:"Hiking",R:"North Van",Tr:"建議開車",W:"戶外",
   F:"Mount Seymour是北溫三大山之一，山名來自19世紀BC省總督Frederick Seymour，本地人愛平日傍晚上山，是因為車流少、停車容易，在半山腰停車場就能俯瞰整個Burrard Inlet——不需要真正健行也能換到山頂視野。",
   BT:"全年皆可開車上山，但冬季山路可能需要雪胎或雪鏈，建議出發前查路況；平日傍晚車流最順，假日車道容易回堵。",
   IT:"山腰停車場放空 → First Lake步道（體力許可） → 觀景點看雲海收尾。先到停車場看視野，有餘力可以再走一段First Lake的平緩步道，最後回到觀景點等雲層在腳下流動，整條路線可依當天體力彈性調整，不會卡在中途進退兩難。",
   N:"冬季山路條件多變，部分路段需要雪胎，出發前建議查DriveBC路況通告；山頂氣溫比市區低很多，記得多帶一件外套。",
   Dt:"平日任意日",S:"604 Now",L:"https://do604.com",Map:"Mount Seymour Provincial Park, North Vancouver, British Columbia, Canada",
   I:wm("Mount Seymour Provincial Park, BC (DSCF8496).jpg")},

  {T:"Pacific Spirit Park 城市森林漫步",M:"weeknight",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Pacific Spirit Park是UBC校園旁的城市森林，超過750公頃、50公里步道網絡，本地人喜歡這裡，是因為下班後不用開很久的車，就能徹底切換到「森林模式」。",
   BT:"全年開放、24小時免費，平日人少靜謐；雨天因樹冠濃密反而更適合來，不太會被淋濕。",
   IT:"Spanish Trail入口進入 → 任選一條短環形步道 → 折返出口收尾。建議先看公園官網地圖選一條30-45分鐘的短環線，這片森林步道網絡很密，新手建議走熟悉的標準環線，避免天黑後迷路。",
   N:"步道網絡複雜，建議提前下載官方地圖或定位App，傍晚出發避免天色過暗時還在林中。",
   Dt:"平日任意日",S:"Tourism Vancouver",L:"https://vancouver.ca/parks",Map:"Pacific Spirit Regional Park, Vancouver, British Columbia, Canada",
   I:wm("Capilano suspension bridge -a.jpg")},

  {T:"Bowen Island 渡輪傍晚",M:"weeknight",C:"逛街",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"Bowen Island曾是溫哥華人的傳統夏日度假小島，20世紀初渡輪通航後就成為近郊放鬆首選，本地人喜歡平日傍晚搭船過去，是因為20分鐘船程帶來的「離島感」遠超過實際距離。",
   BT:"渡輪班次依BC Ferries時刻表，平日傍晚通常班次較少，建議出發前查詢當天時刻表，抓緊末班船時間回程，以免被迫留宿。",
   IT:"Horseshoe Bay搭船 → Snug Cove Artisan Square散步 → 碼頭旁喝一杯收尾。下船後Artisan Square就在碼頭旁，逛完工藝品店跟小店，直接在碼頭附近找間酒吧坐下，全程步行距離很短，不用擔心錯過回程船班。",
   N:"務必確認當天最後一班回程渡輪時間，平日航班比假日少很多，錯過可能要等很久或被迫過夜。",
   Dt:"平日任意日（依渡輪班次）",S:"Daily Hive",L:"https://www.bcferries.com",Map:"Snug Cove, Bowen Island, British Columbia, Canada",
   I:wm("Bowen Island from Murrays Beach.jpg")},

  {T:"Spanish Banks 夕陽野餐",M:"weeknight",C:"Hiking",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"Spanish Banks得名於1792年西班牙探險隊曾在此與英國航海家喬治・溫哥華相遇的歷史事件，這片海灘退潮時沙地延伸數百米，本地人喜歡平日傍晚來，因為比起鄰近的Kits Beach，這裡永遠人少很多。",
   BT:"全年開放、免費，夏季傍晚最推薦，退潮時段（可查潮汐表）沙灘範圍最大；平日比假日人少非常多。",
   IT:"Spanish Banks West停車場 → 沙灘野餐看夕陽 → 沿岸散步到Locarno Beach。找個地方鋪野餐墊看夕陽沉入海峽，吃完可以沿著海岸線散步到隔壁的Locarno Beach，兩個沙灘是連著的，走起來很順、不用折返。",
   N:"沙灘上沒有遮蔭，夏天建議自備陽傘；退潮時段步行範圍變大但部分區域較濕泥，建議穿著方便弄濕的鞋子。",
   Dt:"平日任意日",S:"604 Now",L:"https://do604.com",Map:"Spanish Banks, Vancouver, British Columbia, Canada",
   I:wm("Jericho Beach 2011-10-27-001.jpg")},

  {T:"Harbour Green Park 海港夜景",M:"weeknight",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Harbour Green Park是Coal Harbour碼頭旁相對年輕的公園，本地人喜歡這裡，是因為正對著Canada Place跟北岸山脈，而且因為知名度較低，遊客遠比鄰近的Canada Place少很多——是道地的「私房觀景點」。",
   BT:"全年開放、24小時免費，平日傍晚遊客最少；水上飛機起降的尖峰時段多在白天，傍晚則以欣賞燈火跟夕陽為主。",
   IT:"Coal Harbour海堤散步 → Harbour Green Park草坡坐看夕陽 → Canada Place遠觀夜景。沿著海堤慢慢走到公園草坡找個位子坐下，看完夕陽後可以繼續沿海堤走到Canada Place方向遠觀帆形建築夜景，整段路線都沿海岸，不會迷路也不用過馬路。",
   N:"公園內草坡較開放、無太多遮蔽，風大的日子建議多穿一層外套。",
   Dt:"平日任意日",S:"Tourism Vancouver",L:"https://vancouver.ca/parks",Map:"Harbour Green Park, Vancouver, British Columbia, Canada",
   I:wm("Coal Harbour Community Centre, Vancouver (2012).JPG")},

  {T:"Stawamus Chief 平日輕量挑戰",M:"weeknight",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Stawamus Chief在Squamish原住民文化中被稱為Siyám Smánit，是當地原住民族的聖山、北美最大花崗岩岩壁之一，本地登山愛好者喜歡平日傍晚挑戰First Peak，是因為比起假日的排隊人潮，平日車流順暢、停車也容易很多。",
   BT:"5月到9月的平日傍晚最適合，日照時間夠長才有餘裕；若下班時間夠早（建議下午4點前出發），First Peak來回約2.5小時可以完成。",
   IT:"Chief停車場起登 → First Peak步道 → 山頂觀景平台收尾。整條路線只有一條主線，沿途有清楚標示，登頂後可以俯瞰Squamish海灣與Howe Sound峽灣，原路下山即可，不用擔心路線選擇問題。",
   N:"步道較陡峭、需要一定體力，建議攜帶足夠飲水跟頭燈以防下山時間晚於預期；冬季濕滑路段風險較高，不建議在雨後嘗試。",
   Dt:"5月-9月平日傍晚",S:"604 Now",L:"https://do604.com",Map:"Stawamus Chief Provincial Park, Squamish, British Columbia, Canada",
   I:wm("Hiking The Chief in Squamish 13-1010 - 17.jpg")},

  {T:"Lighthouse Park 夕陽燈塔",M:"weeknight",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Lighthouse Park保留了西溫哥華少有的原始老樹林，園內Point Atkinson Lighthouse建於1874年，是BC省最早的燈塔之一，本地人喜歡平日傍晚來，是因為懸崖步道俯瞰Howe Sound峽灣的視野，幾乎沒有觀光客打擾。",
   BT:"全年開放、24小時免費入園，平日傍晚遊客最少；環形步道約4km，建議日落前1.5-2小時出發完整走完。",
   IT:"停車場起步 → 環形步道走到燈塔 → 懸崖觀景點看夕陽收尾。沿著環形步道走到燈塔拍照，接著找懸崖邊的觀景點坐下等夕陽，環形路線走完正好回到停車場，不會走回頭路。",
   N:"部分懸崖步道路段較靠近邊緣，建議注意安全並避免天黑後還在崖邊步道逗留。",
   Dt:"平日任意日",S:"604 Now",L:"https://do604.com",Map:"Lighthouse Park, West Vancouver, British Columbia, Canada",
   I:wm("The Point Atkinson Light.JPG")},

  {T:"Olympic Village 濕地公園",M:"weeknight",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"Hinge Park所在的Olympic Village曾是2010年冬奧選手村，退役後規劃成低調的濕地公園，本地人喜歡這裡，是因為設有鳥類保護區，傍晚常能看到水鳥活動，而且幾乎沒有觀光客知道這個角落。",
   BT:"全年開放、24小時免費，傍晚光線灑在濕地水面上最美；鳥類活動在清晨或黃昏較活躍，傍晚正是觀察的好時機。",
   IT:"Hinge Park木棧道散步 → 觀景台眺望山景水色 → Olympic Village商店街喝咖啡。沿木棧道慢走到觀景台，看完遠眺山景再走進旁邊的商店街喝杯咖啡收尾，全程都在步行範圍內，動線緊湊不費時。",
   N:"公園範圍不大，適合作為傍晚散步的「順路」景點，不建議單獨為此特地跑一趟，可以跟Olympic Village周邊行程一起安排。",
   Dt:"平日任意日",S:"Tourism Vancouver",L:"https://vancouver.ca/parks",Map:"Hinge Park, Vancouver, British Columbia, Canada",
   I:wm("False Creek Vancouver British Columbia Canada 02.jpg")},

  /* ===== 假日 ===== */
  {T:"Grouse Mountain 纜車登頂",M:"weekend",C:"Hiking",R:"North Van",Tr:"大眾運輸",W:"戶外",
   F:"Grouse Mountain暱稱「溫哥華的山峰」，纜車從1966年就開始運行，本地人喜歡這裡，是因為15分鐘纜車就能從市區海平面瞬間跳到1100米高山視野，山頂的灰熊保護區（Grinder與Coola）更是少有能近距離看到野生灰熊的合法管道。",
   BT:"全年開放，新開幕的Grouse Gravity Coaster重力雲霄飛車為夏季限定設施；假日纜車站排隊人潮較多，建議提早上午或平日前往體驗更從容。",
   IT:"纜車登頂 → 灰熊保護區探訪 → Grouse Gravity Coaster挑戰（夏季限定）。先搭纜車上山，到頂後先去看灰熊再去排隊體驗新開的雲霄飛車，最後在山頂餐廳用餐收尾——這個順序可以避開纜車剛到站時最擁擠的瞬間人流。",
   N:"Grouse Gravity Coaster為2026年夏季限定設施，票價不含上山纜車票，需另外購買；體力有餘者也可選擇挑戰Grouse Grind步道健行上山，但需先確認自身體能與路況。",
   Dt:"全年開放，Coaster為夏季限定",S:"604 Now / Daily Hive",L:"https://www.grousemountain.com",Map:"Grouse Mountain, 6400 Nancy Greene Way, North Vancouver, British Columbia, Canada",
   I:wm("Atop Grouse Mountain in Vancouver BC - (18726704358).jpg")},

  {T:"Steveston Village 漁村老街",M:"weekend",C:"逛街",R:"Richmond",Tr:"建議開車",W:"戶外",
   F:"Steveston曾是世界最大的鮭魚罐頭工業重鎮，19世紀末吸引大量日本移民漁民定居於此，Gulf of Georgia Cannery保留了完整的罐頭工廠歷史現場，本地人喜歡來這裡，是因為老漁村的木造倉庫跟碼頭氣味，跟列治文其他商場區完全是兩個世界。",
   BT:"全年開放，Cannery博物館有固定營業時間（建議出發前查官網確認）；碼頭吃魚薯條建議中午或下午時段，避開觀光團的尖峰人潮。",
   IT:"Gulf of Georgia Cannery參觀 → 碼頭老街散步 → 碼頭旁吃魚薯條收尾。先進博物館了解漁村歷史，出來沿碼頭老街慢慢走，最後在碼頭邊隨便一間魚薯條攤坐下，整段路線集中在碼頭一帶，步行距離都不長。",
   N:"博物館有固定開放時間與門票，並非全天免費開放，出發前建議先查詢當天開放時段。",
   Dt:"全年",S:"Daily Hive",L:"https://www.richmond.ca/steveston",Map:"Steveston Village, Richmond, British Columbia, Canada",
   I:wm("Statues in front of the Cannery (6865002524).jpg")},

  {T:"Garibaldi Provincial Park 高山健行",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Garibaldi Provincial Park名稱來自附近Garibaldi山，這片高山保護區擁有溫哥華近郊少見的火山地貌與翡翠湖泊，本地登山愛好者視這裡為「日歸健行的天花板」，能在一天內走進真正的高山世界。",
   BT:"6月到10月是最佳季節（積雪融化後），建議平日前往，假日Panorama Ridge跟Black Tusk路線停車場常常一早就滿。",
   IT:"Rubble Creek停車場起登 → Garibaldi Lake翡翠湖 → Panorama Ridge或Black Tusk頂峰。先走到湖邊歇腳補水，再依體力選擇繼續挑戰其中一條頂峰路線，全程都是清楚的單一主線步道，不容易迷路，但需要充足體力與時間規劃。",
   N:"全程往返通常需要一整天甚至更久，務必查詢開山日期、攜帶足夠裝備並提早出發；停車場一滿即無法進入，假日建議改平日前往。",
   Dt:"6月-10月",S:"604 Now",L:"https://do604.com",Map:"Garibaldi Provincial Park, British Columbia, Canada",
   I:wm("Atop the Black Tusk in Garibaldi Park.jpg")},

  {T:"Granville Island 全日探索",M:"weekend",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"室內",
   F:"跟前面晚間市集是同一個地方，但白天的Granville Island是另一個樣子——這裡曾是工業船廠小島，1970年代政府刻意保留工業外觀改造成創意聚落，本地人喜歡假日整天耗在這裡，是因為市集、工藝品店、畫廊密度高到走一天都逛不完。",
   BT:"全年開放，Public Market營業時間以官網公告為準；假日上午人潮較少，下午後遊客逐漸增多，建議一早出發。",
   IT:"Public Market採買早餐 → 工藝品店與畫廊漫遊 → 海邊精釀啤酒坐看夕陽。早上先去市場吃早餐，整個下午花在逛工藝品店與小畫廊，傍晚找間海邊的酒吧坐下收尾，整天行程都在小島範圍內完成，不需要額外交通安排。",
   N:"假日車位很搶手，建議搭公車或Aquabus水上計程車前往，省去找車位的麻煩。",
   Dt:"全年",S:"Tourism Vancouver",L:"https://granvilleisland.com",Map:"Granville Island, Vancouver, British Columbia, Canada",
   I:wm("Granville Island (118200909).jpg")},

  {T:"Capilano Suspension Bridge 吊橋公園",M:"weekend",C:"Hiking",R:"North Van",Tr:"建議開車",W:"戶外",
   F:"Capilano Suspension Bridge自1889年就有第一代吊橋存在，是溫哥華歷史最悠久的觀光景點之一，137米長的吊橋橫跨深谷，本地人會推薦給外地朋友，是因為Treetops Adventure樹冠步道跟Cliffwalk懸崖步道能從不同高度體驗同一片峽谷森林。",
   BT:"全年開放，營業時間以官網公告為準；建議假日下午前往，上午是旅行團尖峰時段，下午相對寬鬆。",
   IT:"吊橋體驗 → Treetops Adventure樹冠步道 → Cliffwalk懸崖步道。先走過主吊橋，接著去樹冠步道從高處看森林，最後走懸崖步道從另一個角度俯瞰峽谷，三段體驗剛好是園區規劃的自然動線，跟著走標示就不會錯過任何一段。",
   N:"門票價格較高，建議提前線上購票可能有折扣；旺季人潮多，建議避開上午10點到下午2點的尖峰時段。",
   Dt:"全年",S:"604 Now",L:"https://www.capbridge.com",Map:"Capilano Suspension Bridge Park, North Vancouver, British Columbia, Canada",
   I:wm("Capilano suspension bridge -a.jpg")},

  {T:"Fort Langley 歷史小鎮一日遊",M:"weekend",C:"逛街",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Fort Langley是英屬哥倫比亞殖民地於1858年宣告成立的地點，被視為「BC省的誕生地」，本地人喜歡來這裡，是因為國家歷史遺址旁的老街道至今仍保留古董店、手工果醬鋪，節奏完全慢下來，跟城市的快步調形成強烈對比。",
   BT:"全年開放，Fort Langley國家歷史遺址有固定開放時間（以Parks Canada官網為準）；假日上午前往可避開下午車流，沿Fraser River的老街道全年皆宜散步。",
   IT:"Fort Langley國家歷史遺址參觀 → 老街古董店與果醬鋪 → 精釀酒吧坐下休息。先進歷史遺址了解BC建省的故事，出來沿老街逛古董店跟果醬鋪，最後找間精釀酒吧坐下收尾一天行程，整條老街呈一直線，逛完自然就走到酒吧區。",
   N:"從市區開車約40-50分鐘，建議避開週五傍晚與假日下午的車流尖峰；歷史遺址門票需另外購買。",
   Dt:"全年",S:"Daily Hive",L:"https://www.pc.gc.ca/fortlangley",Map:"Fort Langley National Historic Site, Fort Langley, British Columbia, Canada",
   I:wm("Fort Langley Community Hall.jpg")},

  {T:"Deep Cove 獨木舟全日",M:"weekend",C:"Hiking",R:"North Van",Tr:"建議開車",W:"戶外",
   F:"Deep Cove的獨木舟體驗之所以特別，是因為划向的Indian Arm峽灣是世代屬於Tsleil-Waututh族的傳統水域，兩岸高山直壁而下、野生海豹偶爾出沒，本地人喜歡假日划船來這裡，是因為這種「峽灣秘境感」在溫哥華近郊極為少見。",
   BT:"5月到10月是最佳季節，假日人氣旺，建議上午9點前抵達租船，避開下午的排隊人潮與較強風浪。",
   IT:"租船下水 → 划向Indian Arm峽灣 → 回程Honey's Doughnuts補甜點。早上租好船划向峽灣深處，看夠野生海豹跟峽灣景色後原路划回，上岸後直接去Honey's Doughnuts吃甜點當作儀式收尾，是當地划船人公認的固定流程。",
   N:"假日租船需求量大，建議提前線上預約；風浪較大的日子建議現場諮詢店家是否適合下水，安全優先。",
   Dt:"5月-10月",S:"Tourism Vancouver",L:"https://deepcovekayak.com",Map:"Deep Cove, North Vancouver, British Columbia, Canada",
   I:wm("Lonsdale Ave North Vancouver BC.JPG")},

  {T:"Stanley Park 環園一日",M:"weekend",C:"Hiking",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"溫哥華人心中真正的「城市客廳」。1888年設立，比加拿大聯邦成立還早一年，這片土地世代屬於Squamish、Musqueam、Tsleil-Waututh三個原住民族，園內保留的Totem Poles正是向這段歷史致意。本地人愛它不只因為風景，而是這片668公頃森林、海岸線與市中心步行可達的距離，是全球少有的城市奇蹟——下班後騎車環園一圈，是許多Vancouverite的日常儀式。",
   BT:"全年開放、24小時免費入園無需門票。Seawall騎車建議避開週末上午10點到下午3點的觀光人潮高峰，平日傍晚或週末清晨7-9點人最少、晨光也最美。冬季（11-2月）日照短，建議下午3點前出發完成全程。",
   IT:"建議從Coal Harbour方向逆時針出發，沿Seawall全程約10km、2.5-3小時可騎完，中途在Third Beach歇腳看海。終點順道銜接Granville Island：腳踏車可直接騎到旁邊的迷你渡輪碼頭，3分鐘船程到對岸吃午餐逛市集，全程不需切換交通工具，路線最順、不走回頭路。",
   N:"Seawall沿線偶因施工封閉改道（尤其Lions Gate Bridge附近），出發前建議查Vancouver Park Board官網確認最新路況；租車店多集中在Denman Street與Georgia Street入口，假日尖峰建議提早15-20分鐘到場排隊取車。",
   Dt:"全年",S:"604 Now",L:"https://stanleypark.com",Map:"Stanley Park, Vancouver, British Columbia, Canada",
   I:wm("Stanley Park totem poles, Vancouver (2013) - 1.JPG")},

  {T:"Sunshine Coast / Gibsons 渡輪小旅行",M:"weekend",C:"逛街",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"Gibsons是加拿大知名電視劇《The Beachcombers》的拍攝地，這部劇從1972年播到1990年，是CBC史上播映最久的劇集之一，本地人喜歡搭渡輪去Gibsons，是因為40分鐘船程帶來的「出國感」，遠超過實際的地理距離。",
   BT:"渡輪全年每日營運，建議出發前查詢BC Ferries最新時刻表；假日船班較多但也較容易客滿，建議提早抵達碼頭候船。",
   IT:"Horseshoe Bay搭渡輪 → Gibsons碼頭海岸小鎮散步 → 海鮮市場買現撈海鮮。下船後沿海岸小鎮慢慢逛藝廊跟小店，最後到海鮮市場挑些現撈海鮮當紀念，回程渡輪前記得抓緊時間，整段路線都在碼頭周邊步行可達範圍。",
   N:"請務必確認回程渡輪時間並抓緊抵達碼頭的時間，平日航班比假日少，建議出發前做好雙向時刻表的功課。",
   Dt:"全年（渡輪每日營運）",S:"Daily Hive",L:"https://www.bcferries.com",Map:"Gibsons, British Columbia, Canada",
   I:wm("View of Gibsons from Mt. Elphinstone.jpg")},

  {T:"Bowen Island 島嶼半日逃離",M:"weekend",C:"逛街",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"同樣是Bowen Island，但假日半日遊版本更聚焦在Crest Trail登高俯瞰——這條步道能一次看到Georgia海峽跟對岸溫哥華島的輪廓，本地人喜歡這裡是因為20分鐘渡輪就能換到這種「離島看大陸」的視角轉換。",
   BT:"渡輪全年運行，假日船班較多；Crest Trail建議上午或下午較涼爽的時段前往，避開正午高溫。",
   IT:"Horseshoe Bay搭渡輪 → Artisan Square獨立書店與起司店 → Crest Trail登高俯瞰海峽。下船先逛Artisan Square買點起司跟熏魚當點心，再走Crest Trail登高看海峽景色，回程下山剛好可以趕上下一班渡輪，整段安排時間掌控得宜。",
   N:"Crest Trail有一定坡度，建議穿著合適健行鞋；務必預留時間下山趕渡輪，避免錯過末班船。",
   Dt:"全年",S:"Daily Hive",L:"https://www.bcferries.com",Map:"Bowen Island, British Columbia, Canada",
   I:wm("Bowen Island from Murrays Beach.jpg")},

  {T:"Squamish Chief 花崗岩岩壁登頂",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Stawamus Chief是北美最大花崗岩岩壁之一，在Squamish原住民文化中被稱為神聖之山Siyám Smánit，本地登山愛好者喜歡挑戰假日的三個山頂，是因為每個山頂視野各不相同，能俯瞰Squamish海灣跟Howe Sound峽灣的不同角度。",
   BT:"5月到10月為最佳季節，假日停車場常常一早就滿，建議盡早出發或考慮平日前往（可參考前面的平日輕量挑戰版本）。",
   IT:"Chief停車場起登 → First Peak → Second/Third Peak（依體力選擇）。先登上First Peak，若體力跟時間允許可以繼續挑戰其他兩個山頂，沿途有清楚指標分岔，可以依當天狀況彈性決定要走多遠。",
   N:"假日停車一位難求，建議考慮共乘或搭乘接駁服務；三個山頂全部走完需要較長時間與體力，務必評估自身狀況再決定路線長度。",
   Dt:"5月-10月",S:"604 Now",L:"https://do604.com",Map:"Stawamus Chief Provincial Park, Squamish, British Columbia, Canada",
   I:wm("Hiking The Chief in Squamish 13-1010 - 17.jpg")},

  {T:"Jericho Beach 夏日海灘",M:"weekend",C:"Hiking",R:"Others",Tr:"大眾運輸",W:"戶外",
   F:"Jericho Beach過去是空軍水上飛機基地，戰後改建成公園海灘，本地人喜歡假日來這裡，是因為淺灘水溫相對溫和適合家庭游泳，沙灘排球場跟風帆課程的活力氣氛，跟對面市區沙灘的安靜散步氛圍很不一樣。",
   BT:"夏季是最佳季節，假日下午人潮最多，建議上午抵達占位置；風帆課程需另外報名，建議出發前查詢當天課程時段。",
   IT:"沙灘野餐 → 沙灘排球或游泳 → 沿岸散步到Locarno Beach看夕陽。先找位置鋪野餐墊，玩沙灘排球或游泳消磨下午，傍晚再沿海岸線散步到隔壁海灘看夕陽，整段海岸線是連在一起的，散步動線很順。",
   N:"沙灘BBQ架需要自備炭跟工具，且使用前建議確認當天公園規定；夏季假日人潮多，建議提早占位。",
   Dt:"夏季最佳",S:"604 Now",L:"https://do604.com",Map:"Jericho Beach Park, Vancouver, British Columbia, Canada",
   I:wm("Jericho Beach 2011-10-27-001.jpg")},

  {T:"Harrison Hot Springs 溫泉小鎮",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"室內",
   F:"Harrison Hot Springs自19世紀末就因天然溫泉聞名，曾吸引大量遊客前來「療養度假」，本地人喜歡雨天或需要全身放鬆時來這裡，是因為Harrison Lake湖畔露天溫泉跟沙雕公園的組合，是溫哥華近郊少見的「度假村感」一日遊選擇。",
   BT:"全年開放，溫泉度假村營業時間以官網公告為準；雨天或陰天反而是泡溫泉的最佳時機，冬季也別有風情。",
   IT:"湖邊露天溫泉泡湯 → 沙雕公園散步 → 湖畔餐廳用餐收尾。先泡溫泉徹底放鬆，出來沿湖邊散步看沙雕公園，最後在湖畔找間餐廳吃飯收尾，整個小鎮範圍不大，三個點都在步行距離內。",
   N:"車程約1.5小時，建議避開週五傍晚車流；溫泉門票費用因設施而異，建議出發前查詢當天票價。",
   Dt:"全年",S:"Tourism BC",L:"https://www.harrisonresort.com",Map:"Harrison Hot Springs, British Columbia, Canada",
   I:wm("Harrison Hot Spr Waterfront 2012.JPG")},

  {T:"Chinatown 文化散步與孫中山庭園",M:"weekend",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"戶外",
   F:"孫中山古典中式庭園是1986年世博會時由蘇州工匠依明代園林風格建造，是中國境外第一座江南古典庭園，本地人覺得這裡被嚴重低估，是因為多數遊客只逛中國城商店街卻錯過了這座真正的文化寶藏。",
   BT:"庭園開放時間與門票以官網公告為準，建議假日白天前往，導覽通常含在門票內，值回票價。",
   IT:"孫中山古典中式庭園導覽 → 中國城主街散步 → 手工湯圓老店收尾。先參加庭園導覽了解造園工藝與歷史，出來走進中國城主街，邊走邊看霓虹招牌，最後找間手工湯圓老店吃點心收尾，庭園就在中國城邊緣，動線非常順。",
   N:"庭園需購票入內，並非免費景點；建議查詢當天是否有提供導覽場次，沒有導覽時自行參觀也能拿到說明手冊。",
   Dt:"全年",S:"604 Now",L:"https://vancouverchinatown.ca",Map:"Dr. Sun Yat-Sen Classical Chinese Garden, Vancouver, British Columbia, Canada",
   I:wm("Vancouver's Chinatown at night. (15234326238).jpg")},

  {T:"Whistler 一日山岳旅行",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Whistler曾主辦2010年冬季奧運的滑雪賽事，是北美最大的滑雪度假村，本地人引以為傲的「後花園」之所以特別，是因為Sea-to-Sky Highway沿途本身就是世界級景觀公路，還沒到目的地風景就已經值回車程。",
   BT:"全年皆宜，夏天適合Mountain Bike、峽谷吊橋跟高山花園，冬天則是滑雪季；建議避開週五傍晚跟週日下午的雙向車流尖峰。",
   IT:"Sea-to-Sky Highway沿途停靠Shannon Falls → Whistler Village漫遊 → Peak 2 Peak纜車（夏季可達高山步道）。開車途中可以在Shannon Falls稍作停留，抵達Village後先逛村中心，有體力跟時間可以再搭纜車上山走高山步道，這個順序讓整趟車程不會只是趕路，沿途風景都不浪費。",
   N:"車程約2小時，山路彎多，建議出發前確認天候與路況；冬季可能需要雪胎，出發前查DriveBC公告。",
   Dt:"全年",S:"Tourism Whistler",L:"https://www.whistler.com",Map:"Whistler Village, Whistler, British Columbia, Canada",
   I:wm("Autumn in Whistler Village (24404000548).jpg")},

  {T:"Golden Ears Provincial Park 瀑布步道",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Golden Ears以山頂形似一對金色驢耳朵的山峰命名，這座大型省立公園保留了大溫地區少有的原始森林與瀑布景觀，本地人喜歡夏天帶全家來，是因為Upper Falls跟Lower Falls兩條步道難度親民，加上沙灘泳區跟露營地，一次滿足健行、戲水跟露營三種需求。",
   BT:"5月到10月是最佳季節，瀑布水量在夏季最壯觀；假日上午前往較不擁擠，停車場有限。",
   IT:"Lower Falls步道（較輕鬆） → 沙灘泳區戲水 → 視體力加走Upper Falls。先走較輕鬆的Lower Falls步道熱身，接著到沙灘泳區戲水消暑，體力跟時間允許的話再挑戰較長的Upper Falls步道，這個順序讓全家大小都能依自己的體力彈性參與。",
   N:"兩條步道難度與長度不同，建議出發前依家庭成員體力評估要走哪一條或兩條都走；露營需要提前線上預訂營位。",
   Dt:"5月-10月",S:"Vancouver Trails",L:"https://www.vancouvertrails.com",Map:"Golden Ears Provincial Park, Maple Ridge, British Columbia, Canada",
   I:wm("Alouette Lake Seen from Golden Ears Provincial Park.jpg")},

  {T:"Buntzen Lake 環湖健行",M:"weekend",C:"Hiking",R:"Others",Tr:"建議開車",W:"戶外",
   F:"Buntzen Lake是BC Hydro在20世紀初為水力發電而建的人工水庫，因為水質清澈呈現翡翠色，意外成為熱門的健行戲水景點，本地人喜歡Diez Vistas路線，是因為登上山脊能一次飽覽十個不同角度的絕景，名字「Diez Vistas」（西班牙語：十景）正是由此而來。",
   BT:"5月到10月夏天開放游泳，環湖步道全年可走；停車場假日早上8點前就會滿，務必早到，建議考慮平日前往體驗更從容。",
   IT:"湖邊起步 → 環湖步道或Diez Vistas山脊路線（依體力選擇） → 湖邊戲水收尾。先選擇環湖的輕鬆路線或挑戰登高的Diez Vistas，走完後回到湖邊戲水降溫，這個安排讓健行跟戲水的順序最合理，不會走完還滿身是汗沒地方洗。",
   N:"停車一位難求，務必早到，假日建議考慮共乘；Diez Vistas路線較長且有一定爬升，需評估自身體力。",
   Dt:"5月-10月",S:"Vancouver Trails",L:"https://www.vancouvertrails.com",Map:"Buntzen Lake Recreation Area, Anmore, British Columbia, Canada",
   I:wm("Buntzen lake trail.JPG")},

  {T:"Vancouver Art Gallery 最新特展",M:"weekend",C:"逛街",R:"Downtown",Tr:"大眾運輸",W:"室內",

  function render() {
    var container = document.getElementById("cards");
    container.innerHTML = "";
    DATA.forEach(function (d) {
      container.appendChild(buildCard(d));
    });
    applyFilter();

  function applyFilter() {
    var container = document.getElementById("cards");
    var cards = container.querySelectorAll(".card");
    var cnt = 0;
    cards.forEach(function (c) {
      var ok = (curMode === "all" || c.dataset.mode === curMode)
        && (curF.region === "all" || c.dataset.region === curF.region)
        && (curF.cat === "all" || c.dataset.cat === curF.cat)
        && (curF.transit === "all" || c.dataset.transit === curF.transit)
        && (curF.weather === "all" || c.dataset.weather === curF.weather);
      c.classList.toggle("hidden", !ok);
      if (ok) cnt++;
    });
    document.getElementById("cnt").textContent = cnt;

    var old = container.querySelector(".empty");
    if (old) old.remove();
    if (cnt === 0) {
      var e = document.createElement("div");
      e.className = "empty";
      var et = document.createElement("div");
      et.className = "empty-t";
      et.textContent = "沒有符合條件的行程";
      e.appendChild(et);
      var es = document.createElement("div");
      es.className = "empty-s";
      es.textContent = "試試調整上方篩選條件";
      e.appendChild(es);
      container.appendChild(e);
    }
  }

  document.querySelectorAll(".tab").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".tab").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      curMode = btn.dataset.mode;
      applyFilter();
    });
  });

    chip.addEventListener("click", function () {
      var f = chip.dataset.f;
      document.querySelectorAll(".chip[data-f='" + f + "']").forEach(function (x) { x.classList.remove("active"); });
      chip.classList.add("active");
      curF[f] = chip.dataset.v;
      applyFilter();
    });
  });

  render();

});
</script>
</body>
</html>
